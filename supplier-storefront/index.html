<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Supplier Storefront — prototypes</title>
  <link rel="stylesheet" href="../design-guidelines/colors_and_type.css" />
  <style>
    body {
      margin: 0;
      padding: 48px;
      background: var(--bg-surface);
      min-height: 100vh;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 48px;
      align-items: flex-start;
      justify-content: center;
    }
    .frame-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    /* Scale the iOS device so the whole phone fits in the viewport.
       Click a frame to toggle fit-to-view (0.65) <-> full size (1). */
    .frame-scaler {
      width: calc(402px * var(--scale, 0.65));
      height: calc(874px * var(--scale, 0.65));
      position: relative;
      cursor: zoom-in;
      transition: width 180ms ease, height 180ms ease;
    }
    .frame-scaler.is-full {
      cursor: zoom-out;
      --scale: 1;
    }
    .frame-scaler > div {
      transform: scale(var(--scale, 0.65));
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 180ms ease;
    }
    .frame-label {
      font-family: var(--font-family);
      font-size: var(--fs-footnote);
      font-weight: var(--fw-semibold);
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Force the classic JSX runtime so transformed scripts use the global React
       (the automatic runtime emits `import` statements, illegal in <script>). -->
  <script>
    Babel.registerPreset('classic-react', {
      presets: [[Babel.availablePresets.react, { runtime: 'classic' }]],
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Shared iOS frame primitives -->
  <script type="text/babel" data-presets="classic-react" src="../rules/ios-frame.jsx?v=2"></script>

  <!-- Baseline screen -->
  <script type="text/babel" data-presets="classic-react" src="core.jsx?v=3"></script>

  <!-- Theme: Visual-led hero (operation-aware hero + toggle) -->
  <script type="text/babel" data-presets="classic-react" src="integrated.jsx?v=2"></script>

  <!-- Upcoming theme stubs (trust, story, merch, find) -->
  <script type="text/babel" data-presets="classic-react" src="themes-upcoming.jsx?v=2"></script>

  <!-- Theme shell: top-level theme switcher -->
  <script type="text/babel" data-presets="classic-react" src="shell.jsx?v=2"></script>

  <!-- Explorations (8 visual-led heroes) — kept for reference, not loaded.
  <script type="text/babel" data-presets="classic-react" src="variants/visual-led.jsx?v=3"></script>
  -->

  <!-- Render the theme shell -->
  <script type="text/babel" data-presets="classic-react">
    ReactDOM.createRoot(document.getElementById('root')).render(<ThemeShell />);
  </script>
</body>
</html>
